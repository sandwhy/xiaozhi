  # During development, please create a 'data' directory in the project root, and then create an empty file named [.config.yaml] inside it.
# Any configurations you want to modify or override should be done in [.config.yaml], not by modifying this [config.yaml] file.
# The system prioritizes [data/.config.yaml]. If a setting is missing there, it falls back to this [config.yaml].
# This keeps configuration minimal and protects your secret keys.
# If you are using the Control Panel (智控台), these configurations will be ignored; please use the Control Panel UI instead.

# #####################################################################################
# ############################# Basic Server Run Configuration ########################
server:
  # Server listening address and port
  ip: 0.0.0.0
  port: 8000
  # HTTP service port, used for simple OTA interface (single service deployment), and vision analysis interface
  http_port: 8003
  # This websocket configuration refers to the websocket address sent by the OTA interface to the device
  # If written as default, the OTA interface will automatically generate the websocket address and output it in the startup log. 
  # You can confirm this address by visiting the OTA interface with a browser.
  # When using Docker or public network deployment (SSL, domain), it may not be accurate.
  # So if using Docker, set websocket to the local network address.
  # If using public network deployment, set websocket to the public network address.
  websocket: ws://你的ip或者域名:端口号/xiaozhi/v1/
  # Vision analysis interface address
  # The interface address for vision analysis sent to the device
  # If written as default below, the system will automatically generate the vision recognition address and output it in the startup log.
  # You can confirm this address by visiting it with a browser.
  # When using Docker or public network deployment (SSL, domain), it may not be accurate.
  # So if using Docker, set vision_explain to the local network address.
  # If using public network deployment, set vision_explain to the public network address.
  vision_explain: http://你的ip或者域名:端口号/mcp/vision/explain
  # OTA response timezone offset
  timezone_offset: +8
  # Authentication configuration
  auth:
    # Whether to enable authentication
    enabled: false
    # Whitelist device ID list
    # If the device belongs to the whitelist, tokens will not be verified and access will be allowed directly
    allowed_devices:
      - "11:22:33:44:55:66"
 # MQTT gateway configuration, used for OTA push to device. Format: host:port
  mqtt_gateway: null
  # MQTT signature key, used to generate MQTT connection passwords
  mqtt_signature_key: null
  # UDP gateway configuration
  udp_gateway: null
log:
  # Set the log format for console output: time, log level, tag, message
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  # Set the log format for file output: time, log level, tag, message
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  # Set log level: INFO, DEBUG
  log_level: INFO
  # Set log directory
  log_dir: tmp
  # Set log file
  log_file: "server.log"
  # Set data directory
  data_dir: data

# Delete the sound file when you are done using it
delete_audio: true
# How long to wait before disconnecting after no voice input (seconds), default 2 minutes (120s)
close_connection_no_voice_time: 120
# TTS request timeout (seconds)
tts_timeout: 10
# Tool call timeout (seconds)
tool_call_timeout: 30
# Enable wake word acceleration
enable_wakeup_words_response_cache: true
# Whether to reply to the wake word at the start
enable_greeting: true
# Whether to enable a notification sound after speaking
enable_stop_tts_notify: false
# Notification sound file path
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
# Whether to enable WebSocket heartbeats (ping)
enable_websocket_ping: false


# TTS audio sending delay configuration
# tts_audio_send_delay: Controls audio packet sending interval
#   0: Use precise time control, matching audio frame rate (default)
#   > 0: Use fixed delay (ms), e.g., 60
tts_audio_send_delay: 0

exit_commands:
  - "退出"
  - "关闭"

xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    # Opus supports sample rates: [8000, 12000, 16000, 24000, 48000]
    sample_rate: 16000
    channels: 1
    frame_duration: 60

# Module test configuration
module_test:
  test_sentences:
    - "你好，请介绍一下你自己"
    - "What's the weather like today?"
    - "请用100字概括量子计算的基本原理和应用前景"

# Wake words, used to distinguish between wake-up and normal speech
wakeup_words:
  - "你好小智"
  - "嘿你好呀"
  - "你好小志"
  - "小爱同学"
  - "你好小鑫"
  - "你好小新"
  - "小美同学"
  - "小龙小龙"
  - "喵喵同学"
  - "小滨小滨"
  - "小冰小冰"
# MCP endpoint address. Format: ws://ip:port/mcp/?token=your_token
# Tutorial: https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/mcp-endpoint-integration.md
mcp_endpoint: 你的接入点 websocket地址

# Context source configuration
# Used to inject dynamic data (health, stocks, etc.) into system prompts
# Multiple sources can be added
context_providers:
  - url: ""
    headers:
      Authorization: ""

# Plugin basic configuration
plugins:
  # Configuration for the weather plugin, enter your api_key here
  # This key is shared; it might be rate-limited.
  # For stability, apply for your own (1000 free calls/day).
  # Register at: https://console.qweather.com/#/apps/create-key/over
  # Find your apihost here after applying: https://console.qweather.com/setting?lang=zh
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "广州"
  # Configuration for the ChinaNews plugin, pass the corresponding URL for news types (society, tech, finance supported)
  # For more news types, see: https://www.chinanews.com.cn/rss/
  get_news_from_chinanews:
    default_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    society_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    world_rss_url: "https://www.chinanews.com.cn/rss/world.xml"
    finance_rss_url: "https://www.chinanews.com.cn/rss/finance.xml"
  get_news_from_newsnow:
    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "澎湃新闻;百度热搜;财联社"
  home_assistant:
    devices:
      - 客厅,玩具灯,switch.cuco_cn_460494544_cp1_on_p_2_1
      - 卧室,台灯,switch.iot_cn_831898993_socn1_on_p_2_1
    base_url: http://homeassistant.local:8123
    api_key: 你的home assistant api访问令牌
  play_music:
    music_dir: "./music"  # Path to music files; searches this directory and subdirectories
    music_ext: # Music file types; .mp3 is the most efficient
      - ".mp3"
      - ".wav"
      - ".p3"
    refresh_time: 300 # Interval to refresh the music list in seconds
  search_from_ragflow:
    # Description of the knowledge base for the LLM to know when to call it
    description: "When the user asks about xxx, call this method and use info from the knowledge base to answer"
    # Ragflow API configuration
    base_url: "http://192.168.0.8"
    # Ragflow API access token
    api_key: "ragflow-xxx"
    # Ragflow knowledge base ID
    dataset_ids: ["123456789"]
# Voiceprint identification configuration
voiceprint:
  # Voiceprint interface URL
  url: 
  # Speaker configuration: speaker_id, name, description
  speakers:
    - "test1,张三,张三是一个程序员"
    - "test2,李四,李四是一个产品经理"
    - "test3,王五,王五是一个设计师"
  # Voiceprint similarity threshold (0.0-1.0), default 0.4
  # Higher values are stricter, reducing misidentification but increasing rejection rate
  similarity_threshold: 0.4

# #####################################################################################
# ################################ Character Model Configuration ######################

prompt: |
  you are xiaozhi. helpfull playful

# Default system prompt template file
prompt_template: agent-base-prompt.txt

# Response when a system error occurs
system_error_response: "Master, Xiaozhi is a bit busy right now. Let's try again later."

# Closing prompt
end_prompt:
  enable: true # Whether to enable closing remarks
  # Closing remarks prompt
  prompt: |
    Please end this conversation with a sentence starting with "Time flies," in a sentimental and reluctant tone!

# The module selected for specific processing
selected_module:
  # Voice Activity Detection module, uses SileroVAD by default
  VAD: SileroVAD
  # Automatic Speech Recognition module, uses FunASR local model by default
  ASR: FunASR
  # Calls the actual LLM adapter based on the configuration name type
  LLM: ChatGLMLLM
  # Vision Language Large Model
  VLLM: ChatGLMVLLM
  # TTS calls the actual TTS adapter based on the configuration name type
  TTS: EdgeTTS
  # Memory module, disabled by default; recommend mem0ai for long-term memory, or mem_local_short for privacy
  Memory: nomem
  # Intent recognition module. When enabled, can play music, control volume, and identify exit commands.
  # Set to 'nointent' if you don't want intent recognition.
  # 'intent_llm': high versatility but adds pre-intent module processing time. Supports IoT operations like volume.
  # 'function_call': requires LLM support for function_call. Faster, can theoretically handle all IoT commands.
  # Default free ChatGLMLLM supports function_call, but for stability, DoubaoLLM (model: doubao-1-5-pro-32k-250115) is recommended.
  Intent: function_call

# Intent recognition module, used to understand user intent (e.g., play music)
Intent:
  # Do not use intent recognition
  nointent:
    # Do not change type
    type: nointent
  intent_llm:
    # Do not change type
    type: intent_llm
    # Independent thinking model for intent recognition
    # If empty, defaults to selected_module.LLM
    # If you don't want to use selected_module.LLM for intent, set an independent LLM (e.g., free ChatGLMLLM)
    llm: ChatGLMLLM
    # Modules under plugins_func/functions. Dialog supports corresponding function calls after loading.
    # System default plugins: "handle_exit_intent" and "play_music". Do not reload them.
    # Example: loading weather, role switching, and news plugins
    functions:
      - get_weather
      - get_news_from_newsnow
      - play_music
  function_call:
    # Do not change type
    type: function_call
    # Modules under plugins_func/functions. Dialog supports corresponding function calls after loading.
    # System default plugins: "handle_exit_intent" and "play_music". Do not reload them.
    # Example: loading weather, role switching, and news plugins
    functions:
      - change_role
      - get_weather
      # - search_from_ragflow
      # - get_news_from_chinanews
      - get_news_from_newsnow
      # 'play_music' is internal; 'hass_play_music' is via Home Assistant. Use only one.
      - play_music
      #- hass_get_state
      #- hass_set_state
      #- hass_play_music

Memory:
  mem0ai:
    type: mem0ai
    # https://app.mem0.ai/dashboard/api-keys
    # 1000 free calls per month
    api_key: 你的mem0ai api key
  powermem:
    # PowerMem是OceanBase开源的agent记忆组件，通过本地LLM进行记忆总结
    # Cost: PowerMem itself is free; actual cost depends on the chosen LLM and database
    # - sqlite + free LLM (e.g., glm-4-flash) = completely free
    # - Cloud LLM or cloud database = charged by corresponding service
    # GitHub: https://github.com/oceanbase/powermem
    type: powermem
    # Whether to enable user profiling
    # - false: Use standard memory mode (AsyncMemory)
    # - true: Use user profile mode (UserMemory), automatically extracts info
    # Profile mode supports: oceanbase, seekdb, sqlite (powermem 0.3.0+)
    enable_user_profile: true
    # ========== LLM Config ==========
    llm:
      provider: openai  # Options: qwen, openai, zhipu, etc.
      config:
        api_key: 你的LLM API密钥
        model: qwen-plus
        # openai_base_url: https://api.openai.com/v1  # Optional custom service address
    # ========== Embedding Config ==========
    embedder:
      provider: openai  # Options: qwen, openai, etc.
      config:
        api_key: 你的嵌入模型API密钥
        model: text-embedding-v4
        openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
        # embedding_dims: 1024  # Needed if dimensions are not 1536

    # ========== Database Config ==========
    # oceanbase (recommended), seekdb (recommended), postgres, sqlite (lightweight alternative)
    # Profile mode supports: oceanbase, seekdb, sqlite
    vector_store:
      provider: sqlite
      config: {}  # SQLite requires no additional config
      # OceanBase Example:
      # provider: oceanbase
      # config:
      #   host: 127.0.0.1
      #   port: 2881
      #   user: root@test
      #   password: your_password
      #   db_name: powermem
      #   collection_name: memories  # Default table name
      #   embedding_model_dims: 1024  # Adapts to model (e.g., zhipu embedding-2 is 1024, embedding-3 is 2048)
  nomem:
    # Do not use memory
    type: nomem
  mem_local_short:
    # Local memory summarized by selected_module LLM, data saved locally
    type: mem_local_short
    # Independent thinking model for memory storage
    # If empty, defaults to selected_module.LLM
    # If you don't want selected_module.LLM for memory, set an independent LLM (e.g., free ChatGLMLLM)
    llm: ChatGLMLLM

ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/
  FunASRServer:
    # Deploy FunASR independently using its API service (5 commands only):
    # 1: mkdir -p ./funasr-runtime-resources/models
    # 2: sudo docker run -p 10096:10095 -it --privileged=true -v $PWD/funasr-runtime-resources/models:/workspace/models registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.12
    # 3: (Inside container) cd FunASR/runtime
    # 4: (Inside container) nohup bash run_server_2pass.sh --download-model-dir /workspace/models --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx --model-dir iic/SenseVoiceSmall-onnx --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx --lm-dir damo/speech_ngram_lm_zh-cn-ai-wesp-fst --itn-dir thuduj12/fst_itn_zh --hotword /workspace/models/hotwords.txt > log.txt 2>&1 &
    # 5: (Inside container) tail -f log.txt
    # Once models download, it's ready.
    # Note: Above uses CPU; for GPU, see: https://github.com/modelscope/FunASR/blob/main/runtime/docs/SDK_advanced_guide_online_zh.md
    type: fun_server
    host: 127.0.0.1
    port: 10096
    is_ssl: true
    api_key: none
    output_dir: tmp/
  SherpaASR:
    # Sherpa-ONNX local ASR (manual model download required)
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17
    output_dir: tmp/
    # Model type: sense_voice (multilingual) or paraformer (Chinese specialized)
    model_type: sense_voice
  SherpaParaformerASR:
    # Chinese ASR model, can run on low-performance devices (manual model download required, e.g., RK3566-2g)
    # Detail: docs/sherpa-paraformer-guide.md
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-paraformer-zh-small-2024-03-09
    output_dir: tmp/
    model_type: paraformer
  DoubaoASR:
    # Apply for Keys here: https://console.volcengine.com/speech/app
    # DoubaoASR (pay-per-request) vs DoubaoStreamASR (pay-per-hour)
    # Generally, per-request is cheaper, but StreamASR uses LLM tech for better results
    type: doubao
    appid: 你的火山引擎语音合成服务appid
    access_token: 你的火山引擎语音合成服务access_token
    cluster: volcengine_input_common
    # Hotwords/replacement flow: https://www.volcengine.com/docs/6561/155738
    boosting_table_name: （选填）你的热词文件名称
    correct_table_name: （选填）你的替换词文件名称
    output_dir: tmp/
  DoubaoStreamASR:
    # Apply for Keys here: https://console.volcengine.com/speech/app
    # Enable at: https://console.volcengine.com/speech/service/10011
    type: doubao_stream
    appid: 你的火山引擎语音合成服务appid
    access_token: 你的火山引擎语音合成服务access_token
    cluster: volcengine_input_common
    # Hotwords/replacement flow: https://www.volcengine.com/docs/6561/155738
    boosting_table_name: （选填）你的热词文件名称
    correct_table_name: （选填）你的替换词文件名称
    # Whether to enable multilingual recognition mode
    enable_multilingual: False
    # If language is empty, supports Mandarian, English, Cantonese, etc.
    # Language list: https://www.volcengine.com/docs/6561/1354869
    # language: zh-cn
    # Silence determination duration (ms), default 200ms
    end_window_size: 200
    output_dir: tmp/
  TencentASR:
    # Token application: https://console.cloud.tencent.com/cam/capi
    # Free resources: https://console.cloud.tencent.com/asr/resourcebundle
    type: tencent
    appid: 你的腾讯语音合成服务appid
    secret_id: 你的腾讯语音合成服务secret_id
    secret_key: 你的腾讯语音合成服务secret_key
    output_dir: tmp/
  AliyunASR:
    # Alibaba Cloud Intelligent Speech Interaction, requires service activation on the platform
    # HTTP POST request, processes complete audio at once
    # Platform: https://nls-portal.console.aliyun.com/
    # AliyunASR (batch processing) vs AliyunStreamASR (real-time interaction)
    # Non-streaming is generally cheaper (¥0.24/min vs ¥0.3/min)
    type: aliyun
    appkey: 你的阿里云智能语音交互服务项目Appkey
    token: 你的阿里云智能语音交互服务AccessToken (temporary 24h; use access_key_id/secret for long-term)
    access_key_id: 你的阿里云账号access_key_id
    access_key_secret: 你的阿里云账号access_key_secret
    output_dir: tmp/
  AliyunStreamASR:
    # Alibaba Cloud Intelligent Speech Interaction - Real-time Streaming
    # WebSocket connection, real-time audio stream processing
    type: aliyun_stream
    appkey: 你的阿里云智能语音交互服务项目Appkey
    token: 你的阿里云智能语音交互服务AccessToken
    access_key_id: 你的阿里云账号access_key_id
    access_key_secret: 你的阿里云账号access_key_secret
    # Server region selection, e.g., nls-gateway-cn-shanghai.aliyuncs.com
    host: nls-gateway-cn-shanghai.aliyuncs.com
    # Sentence detection time (ms), controls silence duration before segmenting, default 800ms
    max_sentence_silence: 800
    output_dir: tmp/
  BaiduASR:
    # Get AppID/Key/Secret: https://console.bce.baidu.com/ai-engine/old/#/ai/speech/app/list
    type: baidu
    app_id: 你的百度语音技术AppID
    api_key: 你的百度语音技术APIKey
    secret_key: 你的百度语音技术SecretKey
    # Language param, 1537 is Mandarian. See: https://ai.baidu.com/ai-doc/SPEECH/0lbxfnc9b
    dev_pid: 1537
    output_dir: tmp/
  OpenaiASR:
    # OpenAI ASR, requires an organization and api_key
    # Supports multilingual; see docs: https://platform.openai.com/docs/guides/speech-to-text
    # Needs internet
    # Apply at: https://platform.openai.com/settings/organization/api-keys
    type: openai
    api_key: 你的OpenAI API密钥
    base_url: https://api.openai.com/v1/audio/transcriptions
    model_name: gpt-4o-mini-transcribe
    output_dir: tmp/
  GroqASR:
    # Groq ASR, requires API key from Groq Console
    # Apply at: https://console.groq.com/keys
    type: openai
    api_key: 你的Groq API密钥
    base_url: https://api.groq.com/openai/v1/audio/transcriptions
    model_name: whisper-large-v3-turbo
    output_dir: tmp/
  VoskASR:
    # Official site: https://alphacephei.com/vosk/
    # Offline ASR library, supports multiple languages
    # Download models: https://alphacephei.com/vosk/models (e.g., vosk-model-small-cn-0.22)
    # Fully offline, no internet needed
    type: vosk
    model_path: 你的模型路径，如：models/vosk/vosk-model-small-cn-0.22
    output_dir: tmp/
  Qwen3ASRFlash:
    # Qwen3-ASR-Flash, requires API Key from Alibaba Bailian platform
    # Apply at: https://bailian.console.aliyun.com/#/api-key
    # Supports multilingual recognition, singing, noise rejection, etc.
    type: qwen3_asr_flash
    api_key: 你的阿里云百炼API密钥
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-asr-flash
    output_dir: tmp/
    # ASR Option Config
    enable_lid: true  # Automatic Language Identification
    enable_itn: true  # Inverse Text Normalization
    #language: "zh"  # Language (zh, en, ja, ko, etc.)
    context: ""  # Context info to improve accuracy (max 10000 tokens)
  XunfeiStreamASR:
    # Xunfei Streaming ASR Service
    # Apply for APPID/Secret/Key at: https://www.xfyun.cn/
    type: xunfei_stream
    # Mandatory params - Xunfei platform info
    app_id: 你的APPID
    api_key: 你的APIKey
    api_secret: 你的APISecret
    # Recognition parameters
    domain: slm # Recognition domain: iat (daily), medical, finance, etc.
    language: zh_cn # Language: zh_cn (Chinese), en_us (English)
    accent: mandarin # Accent: mandarin
    output_dir: tmp/
  AliyunBLStreamASR:
    # Alibaba Cloud Bailian Paraformer Real-time ASR
    # WebSocket real-time streaming, supports multilingual, hotwords, semantic segmenting, etc.
    # Platform: https://bailian.console.aliyun.com/
    # API Key: https://bailian.console.aliyun.com/#/api-key
    # Supported models: paraformer-realtime-v2 (recommended), paraformer-realtime-8k-v2, etc.
    type: aliyunbl_stream
    # Mandatory params
    api_key: 你的阿里云百炼API密钥
    # Model selection, v2 recommended
    model: paraformer-realtime-v2
    # Audio format and sample rate
    format: pcm
    sample_rate: 16000  # v2 supports any; v1 is 16000; 8k is 8000
    # Optional params
    disfluency_removal_enabled: false  # Filter filler words (um, uh, etc.)
    semantic_punctuation_enabled: false  # Semantic segmenting (true: meeting mode, accurate; false: VAD mode, low latency)
    max_sentence_silence: 200  # VAD silence threshold (ms), 200-6000
    multi_threshold_mode_enabled: false  # Prevents overly long VAD segments
    punctuation_prediction_enabled: true  # Auto punctuation
    inverse_text_normalization_enabled: true  # ITN (Chinese numbers to Arabic)
    # Hotword doc: https://help.aliyun.com/zh/model-studio/custom-hot-words?
    # language_hints: ["zh", "en"]  # Optional languages: zh, en, ja, yue, ko, de, fr, ru
    output_dir: tmp/  
VAD:
  SileroVAD:
    type: silero
    threshold: 0.5
    threshold_low: 0.3
    model_dir: models/snakers4_silero-vad
    min_silence_duration_ms: 200  # If pauses are long, increase this value

LLM:
  # All OpenAI types can have hyperparameters modified, using AliLLM as an example
  # Currently supported types: openai, dify, ollama
  AliLLM:
    # Define LLM API type
    type: openai
