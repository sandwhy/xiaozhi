<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaozhi Digital Human</title>
    <link rel="stylesheet" href="css/index.css?v=0206">
    <script>
        // Check if opened using the file:// protocol
        if (window.location.protocol === 'file:') {
            document.addEventListener('DOMContentLoaded', function () {
                // Create background blur overlay
                const overlayDiv = document.createElement('div');
                overlayDiv.className = 'file-protocol-overlay';
                document.body.appendChild(overlayDiv);

                // Create warning box
                const warningDiv = document.createElement('div');
                warningDiv.id = 'fileProtocolWarning';
                warningDiv.innerHTML = `
                    <h2>⚠️ Warning: Please open this page using an HTTP server</h2>
                    <p>You are currently opening the page using a local file (file:// protocol), which may cause abnormal page behavior.</p>
                    <p>You can use Nginx mapping to start the Xiaozhi Digital Human page, or follow these steps to start the test runtime:</p>
                    <ol>
                        <li>Open a command line terminal</li>
                        <li>Navigate to the digital-human directory in the command line</li>
                        <li>Execute the following command to start the Xiaozhi Digital Human page runtime:</li>
                    </ol>
                    <pre>python start.py</pre>
                    <p>Then visit in your browser: <strong>http://localhost:8006/index.html</strong></p>
                `;
                document.body.appendChild(warningDiv);
            });
        }
    </script>
</head>

<body>
    <!-- Background container -->
    <div class="background-container" id="backgroundContainer">
        <div class="background-overlay"></div>
    </div>

    <!-- Main container -->
    <div class="container">

        <!-- Camera display area (draggable) -->
        <div class="camera-container" id="cameraContainer">
            <video id="cameraVideo" autoplay playsinline muted></video>
            <div class="camera-switch-mask" id="cameraSwitchMask">
                <div class="camera-switch-container">
                    <!-- Camera switch button -->
                    <div class="camera-switch" id="cameraSwitch">
                        <svg class="btn-icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"
                            p-id="7319" width="32" height="32">
                            <path

-55.9 59.8h-671c-30.9 0-55.9-26.8-55.9-59.8V361.4c0-33 25-59.8 55.9-59.8h111.2c25.8 0 82-119.7 111.6-119.7h223.2c29.5 0 85.6 119.7 111.5 119.7h113.5c30.9 0 55.9 26.8 55.9 59.8v418.9z"
                                p-id="7320" fill="#ffffff"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Connection status indicator - top center of the page -->
        <div class="connection-status-top">
            <div class="status-indicator">
                <span class="status-dot status-disconnected"></span>
                <span id="connectionStatus">Offline</span>
            </div>
        </div>

        <!-- Model loading prompt -->
        <div class="model-container">
            <div class="model-loading" id="modelLoading">
                <div class="loading-char-float">
                    <div class="main-char">
                        <span>L</span><span>o</span><span>a</span><span>d</span><span>i</span><span>n</span><span>g</span><span>.</span><span>.</span><span>.</span><span>✨</span>
                    </div>
                    <div class="shadow-char">Loading...✨</div>
                </div>
            </div>
        </div>

        <!-- Live2D Canvas container -->
        <canvas id="live2d-stage"></canvas>

        <!-- Chat message stream (barrage style) -->
        <div class="chat-container">
            <div class="chat-stream" id="chatStream">
                <!-- Chat messages will be dynamically inserted here -->
            </div>
            <div class="chat-ipt" id="chatIpt">
                <input type="text" id="messageInput" autocomplete="off" placeholder="Type a message and press Enter to send">
            </div>
        </div>

        <!-- Bottom control bar -->
        <div class="control-bar">
            <button class="control-btn" id="settingsBtn" title="Settings">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5A3.5 3.5 0 0 1 15.5 12A3.5 3.5 0 0 1 12 15.5M19.43 12.97C19.47 12.65 19.5 12.33 19.5 12C19.5 11.67 19.47 11.34 19.43 11L21.54 9.37C21.73 9.22 21.78 8.95 21.66 8.73L19.66 5.27C19.54 5.05 19.27 4.96 19.05 5.05L16.56 6.05C16.04 5.66 15.5 5.32 14.87 5.07L14.5 2.42C14.46 2.18 14.25 2 14 2H10C9.75 2 9.54 2.18 9.5 2.42L9.13 5.07C8.5 5.32 7.96 5.66 7.44 6.05L4.95 5.05C4.73 4.96 4.46 5.05 4.34 5.27L2.34 8.73C2.22 8.95 2.27 9.22 2.46 9.37L4.57 11C4.53 11.34 4.5 11.67 4.5 12C4.5 12.33 4.53 12.65 4.57 12.97L2.46 14.63C2.27 14.78 2.22 15.05 2.34 15.27L4.34 18.73C4.46 18.95 4.73 19.03 4.95 18.95L7.44 17.94C7.96 18.34 8.5 18.68 9.13 18.93L9.5 21.58C9.54 21.82 9.75 22 10 22H14C14.25 22 14.46 21.82 14.5 21.58L14.87 18.93C15.5 18.68 16.04 18.34 16.56 17.94L19.05 18.95C19.27 19.03 19.54 18.95 19.66 18.73L21.66 15.27C21.78 15.05 21.73 14.78 21.54 14.63L19.43 12.97Z" />
                </svg>
                <span class="btn-text">Settings</span>
            </button>

            <button class="control-btn" id="cameraBtn" title="Please connect to server first" disabled>
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17,10.5V7A1,1 0 0,0 16,6H4A1,1 0 0,0 3,7V17A1,1 0 0,0 4,18H16A1,1 0 0,0 17,17V13.5L21,17.5V6.5L17,10.5Z" />
                </svg>
                <span class="btn-text">Camera</span>
            </button>

            <button class="control-btn dial-btn" id="dialBtn" title="Dial">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M6.62,10.79C8.06,13.62 10.38,15.94 13.21,17.38L15.41,15.18C15.69,14.9 16.08,14.82 16.43,14.93C17.55,15.3 18.75,15.5 20,15.5A1,1 0 0,1 21,16.5V20A1,1 0 0,1 20,21A17,17 0 0,1 3,4A1,1 0 0,1 4,3H7.5A1,1 0 0,1 8.5,4C8.5,5.25 8.7,6.45 9.07,7.57C9.18,7.92 9.1,8.31 8.82,8.59L6.62,10.79Z" />
                </svg>
                <span class="btn-text">Dial</span>
            </button>

            <button class="control-btn" id="recordBtn" title="Start recording" disabled>
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z" />
                </svg>
                <span class="btn-text">Record</span>
            </button>
        </div>
    </div>

    <!-- Settings modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content settings-modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="device">Device Config</button>
                    <button class="tab-btn" data-tab="wakeword">Wake Word</button>
                    <button class="tab-btn" data-tab="mcp">MCP Tools</button>
                    <button class="tab-btn" data-tab="other">Avatar Skin</button>
                </div>

                <div class="tab-content active" id="deviceTab">
                    <!-- Device configuration panel -->
                    <div class="config-panel">
                        <div class="control-panel">
                            <div class="config-row">
                                <div class="config-item">
                                    <label for="deviceMac">Device MAC:</label>
                                    <input type="text" id="deviceMac" placeholder="device-id">
                                </div>
                            </div>
                            <div class="config-row">
                                <div class="config-item">
                                    <label for="clientId">Client ID:</label>
                                    <input type="text" id="clientId" value="web_test_client" placeholder="client-id">
                                </div>
                                <div class="config-item">
                                    <label for="deviceName">Device Name:</label>
                                    <input type="text" id="deviceName" value="Web Test Device" maxlength="50"
                                        placeholder="deviceName">
                                </div>
                            </div>
                            <div class="config-row">
                                <div class="config-item">
                                    <label for="emojiEnabled">Emoji Expressions:</label>
                                    <select id="emojiEnabled" class="model-select">
                                        <option value="true">Enable</option>
                                        <option value="false" selected>Disable</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Connection info panel -->
                    <div class="connection-controls">
                        <div class="input-group">
                            <label for="otaUrl">OTA Server URL:</label>
                            <input type="text" id="otaUrl" value="http://127.0.0.1:8002/xiaozhi/ota/"
                                placeholder="OTA server URL, e.g.: http://127.0.0.1:8002/xiaozhi/ota/" />
                        </div>
                        <div class="input-group">
                            <label for="serverUrl">WebSocket Server URL:</label>
                            <input type="text" id="serverUrl" value="" readonly disabled
                                placeholder="After filling in the OTA URL, click the Dial button to automatically connect" />
                        </div>
                        <div class="input-group">
                            <label for="visionUrl">Vision Analysis URL:</label>
                            <input type="text" id="visionUrl" value="" readonly disabled placeholder="Automatically obtained after successful WebSocket connection" />
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="wakewordTab">
                    <div class="config-panel">
                        <div class="control-panel">
                            <div class="config-row">
                                <div class="config-item">
                                    <label for="wakewordEnabled">Enable Local Wake Word:</label>
                                    <select id="wakewordEnabled" class="model-select">
                                        <option value="true">Enable</option>
                                        <option value="false">Disable</option>
                                    </select>
                                </div>
                            </div>
                            <div class="config-row">
                                <div class="config-item">
                                    <label for="wakewordWsUrl">Wake Word Service URL:</label>
                                    <input type="text" id="wakewordWsUrl" placeholder="ws://127.0.0.1:8006/wakeword-ws">
                                </div>
                            </div>
                            <div class="config-row">
                                <div class="config-item">
                                    <label for="wakewordList">Wake Word Config (one per line):</label>
                                    <textarea id="wakewordList" placeholder="e.g.&#10;Xiaozhi Xiaozhi&#10;Hello Xiaozhi"></textarea>
                                </div>
                            </div>
                            <div class="modal-actions">
                                <button type="button" class="btn-primary" id="applyWakewordBtn">Apply Wake Word</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="mcpTab">
                    <!-- MCP Tool Management Area -->
                    <div class="mcp-tools-container">
                        <div class="mcp-tools-header">
                            <h3>MCP Tool Management</h3>
                        </div>
                        <div class="mcp-tools-panel" id="mcpToolsPanel">
                            <div class="mcp-tools-list" id="mcpToolsContainer">
                                <!-- Tool list will be dynamically inserted here -->
                            </div>
                            <div class="mcp-actions">
                                <button class="btn-primary" id="addMcpToolBtn">
                                    ➕ Add New Tool
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="otherTab">
                    <div class="other-settings-panel">
                        <div class="control-panel">
                            <div class="config-row">
                                <div class="config-item">
                                    <label>Select Model:</label>
                                    <select id="live2dModelSelect" class="model-select">
                                        <option value="hiyori_pro_zh">hiyori (Haruhi)</option>
                                        <option value="natori_pro_zh">natori (Natori)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="config-row">
                                <div class="config-item">
                                    <label></label>
                                    <button class="background-btn" id="backgroundBtn" title="Switch Background">
                                        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                                            <path
                                                d="M12,18A6,6 0 0,1 6,12C6,11 6.25,10.03 6.7,9.2L5.24,7.74C4.46,8.97 4,10.43 4,12A8,8 0 0,0 12,20V23L16,19L12,15V18M12,4V1L8,5L12,9V6A6,6 0 0,1 18,12C18,13 17.75,13.97 17.3,14.8L18.76,16.26C19.54,15.03 20,13.57 20,12A8,8 0 0,0 12,4Z" />
                                        </svg>
                                        <span class="btn-text">Switch Background</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MCP Tool Editing Modal -->
    <div id="mcpToolModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="mcpModalTitle">Add Tool</h2>
                <button class="close-btn" id="closeMcpModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="mcpErrorContainer"></div>
                <form id="mcpToolForm">
                    <div class="input-group">
                        <label for="mcpToolName">Tool Name *</label>
                        <input type="text" id="mcpToolName" placeholder="e.g.: self.get_device_status" required>
                    </div>
                    <div class="input-group">
                        <label for="mcpToolDescription">Tool Description *</label>
                        <textarea id="mcpToolDescription" placeholder="Detailed description of the tool's functions and scenarios..." required></textarea>
                    </div>
                    <div class="input-group">
                        <div class="input-group-header">
                            <label>Input Parameters</label>
                            <button type="button" class="properties-btn-primary" id="addMcpPropertyBtn">
                                ➕ Add Parameter
                            </button>
                        </div>
                        <div class="properties-container">
                            <div class="mcp-empty-state" id="mcpEmptyState">
                                No parameters yet, click the button above to add a parameter
                            </div>
                            <div class="mcp-properties-list" id="mcpPropertiesContainer">
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="mcpMockResponse">
                            Mock Response (JSON format, optional)
                            <span style="font-size: 12px; color: #999; font-weight: normal;">- Leave empty to return default success message</span>
                        </label>
                        <textarea id="mcpMockResponse" placeholder='{"success": true, "data": "Execution successful"}'></textarea>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" id="cancelMcpBtn">Cancel</button>
                        <button type="submit" class="btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Parameter Editing Modal -->
    <div id="mcpPropertyModal" class="modal">
        <div class="modal-content property-modal">
            <div class="modal-header">
                <h2 id="mcpPropertyModalTitle">Edit Parameter</h2>
                <button class="close-btn" id="closeMcpPropertyModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="mcpPropertyForm">
                    <input type="hidden" id="mcpPropertyIndex" value="-1">
                    <div class="input-group">
                        <label for="mcpPropertyName">Parameter Name *</label>
                        <input type="text" id="mcpPropertyName" placeholder="e.g.: param_1" required>
                    </div>
                    <div class="input-group">
                        <label for="mcpPropertyType">Data Type *</label>
                        <select id="mcpPropertyType" class="model-select" required>
                            <option value="string">String</option>
                            <option value="integer">Integer</option>
                            <option value="number">Number</option>
                            <option value="boolean">Boolean</option>
                            <option value="array">Array</option>
                            <option value="object">Object</option>
                        </select>
                    </div>
                    <div class="input-group" id="mcpPropertyRangeGroup" style="display: none;">
                        <div class="config-row">
                            <div class="config-item">
                                <label for="mcpPropertyMinimum">Minimum Value</label>
                                <input type="number" id="mcpPropertyMinimum" placeholder="Optional">
                            </div>
                            <div class="config-item">
                                <label for="mcpPropertyMaximum">Maximum Value</label>
                                <input type="number" id="mcpPropertyMaximum" placeholder="Optional">
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="mcpPropertyDescription">Parameter Description</label>
                        <input type="text" id="mcpPropertyDescription" placeholder="Optional">
                    </div>
                    <div class="input-group">
                        <label class="mcp-checkbox-label">
                            <input type="checkbox" id="mcpPropertyRequired">
                            Required Parameter
                        </label>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" id="cancelMcpPropertyBtn">Cancel</button>
                        <button type="submit" class="btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Background loading -->
    <script src="js/ui/background-load.js?v=0205"></script>

    <!-- PIXI.js 2D rendering engine -->
    <script src="js/live2d/pixi.js?v=0205"></script>

    <!-- Live2D Cubism 4.0 SDK -->
    <script src="js/live2d/live2dcubismcore.min.js?v=0205"></script>
    <script src="js/live2d/cubism4.min.js?v=0205"></script>

    <!-- Live2D Manager -->
    <script src="js/live2d/live2d.js?v=0205"></script>

    <!-- Opus decoding library -->
    <script src="js/utils/libopus.js?v=0205"></script>

    <!-- Main application entry point -->
    <script type="module" src="js/app.js?v=0205"></script>

    <!-- Global error handling -->
    <script>
        // Add global error handling
        window.addEventListener('error', function (event) {
            console.error('Global error:', event.error);
        });

        // Add unhandled Promise rejection handling
        window.addEventListener('unhandledrejection', function (event) {
            console.error('Unhandled Promise rejection:', event.reason);
        });
    </script>
</body>

</html>
